<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Campus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0f1a 0%, #111827 50%, #0d1424 100%);
      border-radius: 20px;
      border: 1px solid rgba(129, 140, 248, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(129, 140, 248, 0.1) inset,
        0 0 60px rgba(129, 140, 248, 0.05) inset;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 {
      width: 200px; height: 200px;
      background: #818cf8;
      top: -60px; left: -60px;
    }
    .orb-2 {
      width: 150px; height: 150px;
      background: #f472b6;
      bottom: -40px; right: -40px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4); }
      50%       { box-shadow: 0 8px 40px rgba(99, 102, 241, 0.7); }
    }

    .logo-text { display: flex; flex-direction: column; }
    .logo-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #f1f5f9;
      line-height: 1;
    }
    .logo-sub {
      font-size: 12px;
      color: #818cf8;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 1;
    }

    .progress-bar {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #818cf8, #f472b6);
      border-radius: 4px;
      animation: loading 2.5s ease-in-out infinite;
    }
    @keyframes loading {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 70%;  margin-left: 15%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    .status-text {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.5px;
    }

    .version {
      position: absolute;
      bottom: 16px;
      font-size: 10px;
      color: rgba(100, 116, 139, 0.5);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="logo-wrap">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">
        <span class="logo-name">Smart Campus</span>
        <span class="logo-sub">BBDU Digital Portal</span>
      </div>
    </div>

    <div class="status">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <span class="status-text" id="statusText">Starting services…</span>
    </div>

    <span class="version">v1.0.0</span>
  </div>

  <script>
    const msgs = [
      'Starting services…',
      'Loading database…',
      'Initializing modules…',
      'Almost ready…',
    ];
    let i = 0;
    const el = document.getElementById('statusText');
    setInterval(() => {
      i = (i + 1) % msgs.length;
      el.textContent = msgs[i];
    }, 800);
  </script>
</body>
</html>
